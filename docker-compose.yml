

services:

  # Node.js Backend
  server:
    build: ./server
    container_name: skynlab-server
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  # React Frontend
  client:
    build: ./client
    container_name: skynlab-client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server