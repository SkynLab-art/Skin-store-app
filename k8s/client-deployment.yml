apiVersion: apps/v1
kind: Deployment
metadata:
  name: skynlab-client
  labels:
    app: skynlab-client
spec:
  replicas: 2
  selector:
    matchLabels:
      app: skynlab-client
  template:
    metadata:
      labels:
        app: skynlab-client
    spec:
      containers:
        - name: skynlab-client
          image: skynlab-client:latest
          ports:
            - containerPort: 5173
          env:
            - name: NODE_ENV
              value: "production"