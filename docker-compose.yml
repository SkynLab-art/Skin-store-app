services:

  # Node.js Backend
  server:
    build: ./server
    container_name: skynlab-server
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development

  # React Frontend
  client:
    build: ./client
    container_name: skynlab-client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: skynlab-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - server

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: skynlab-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=skynlab123
    depends_on:
      - prometheus