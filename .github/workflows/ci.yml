name: SkynLab CI Pipeline

on:
  push:
    branches: [develop, main, feature/*]
  pull_request:
    branches: [develop, main]

jobs:
  test-server:
    name: Test Node.js Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install server dependencies
        run: |
          cd server
          npm install

      - name: Verify server starts
        run: |
          cd server
          node -e "require('./index.js')" &
          sleep 2
          echo "Server check passed ✅"

  build-client:
    name: Build React Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install client dependencies
        run: |
          cd client
          npm install

      - name: Build React app
        run: |
          cd client
          npm run build