apiVersion: v1
kind: Service
metadata:
  name: skynlab-client-service
spec:
  selector:
    app: skynlab-client
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5173
  type: LoadBalancer
```

---

## Key Difference — LoadBalancer vs ClusterIP

| Type | Used For | Accessible From |
|------|----------|-----------------|
| `ClusterIP` | Backend (server) | Inside cluster only |
| `LoadBalancer` | Frontend (client) | Public internet ✅ |

### Why LoadBalancer for Frontend?
```
Internet
    ↓
LoadBalancer (public IP) ← customers hit this
    ↓
React Pods (port 5173)
    ↓
Node.js Service (internal)
    ↓
Node.js Pods (port 5000)